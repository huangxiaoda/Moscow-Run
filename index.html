<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>莫斯科晨跑 · 可拖拽面板 | 轨迹分享</title>
    <!-- Leaflet 核心 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- html2canvas 截图分享 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        body {
            height: 100vh;
            width: 100%;
            overflow: hidden;
            background: #f5f7fe;
        }
        #map {
            height: 100%;
            width: 100%;
            z-index: 1;
        }
        /* 顶部导航栏 ———— 完全恢复第一版样式 */
        .app-header {
            position: absolute;
            top: 16px;
            left: 16px;
            right: 16px;
            z-index: 20;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255,255,255,0.5);
            pointer-events: auto;
        }
        .logo-area h1 {
            font-size: 1.45rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1e3c72, #2b4c7c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }
        .logo-area p {
            font-size: 0.7rem;
            font-weight: 500;
            color: #4a627a;
            margin-top: 2px;
            display: block;
        }
        .weather-badge {
            background: rgba(0,0,0,0.05);
            border-radius: 40px;
            padding: 6px 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #1f3b4c;
        }
        .weather-badge i {
            font-size: 1.2rem;
            color: #f4b942;
        }
        /* 底部卡片栏 (紧凑但保留原风格) */
        .routes-carousel {
            position: absolute;
            bottom: 12px;
            left: 12px;
            right: 12px;
            z-index: 20;
            overflow-x: auto;
            white-space: nowrap;
            padding-bottom: 6px;
            scrollbar-width: thin;
            pointer-events: auto;
        }
        .routes-container {
            display: inline-flex;
            gap: 12px;
            padding: 4px 2px;
        }
        .route-card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(6px);
            border-radius: 24px;
            width: 240px;
            padding: 12px 14px;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: 0.2s;
            display: inline-block;
            vertical-align: top;
            white-space: normal;
            border-left: 3px solid transparent;
        }
        .route-card.active {
            border-left-color: #ff7a3c;
            background: white;
        }
        .route-name {
            font-weight: 700;
            font-size: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .route-badge {
            font-size: 0.6rem;
            background: #eef2ff;
            padding: 2px 8px;
            border-radius: 20px;
        }
        .route-stats {
            display: flex;
            gap: 12px;
            margin: 8px 0 4px;
            font-size: 0.7rem;
            color: #2c3e4e;
        }
        .route-desc {
            font-size: 0.65rem;
            color: #4b6e8a;
            display: flex;
            gap: 5px;
            align-items: center;
        }
        .btn-start {
            margin-top: 6px;
            font-size: 0.65rem;
            text-align: right;
            color: #ff7a3c;
        }
        /* 跑步数据面板 (可拖拽 + 可折叠) */
        .run-panel {
            position: absolute;
            bottom: 12px;
            left: 12px;
            z-index: 30;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            padding: 10px 14px;
            width: 210px;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            transition: none; /* 拖拽时无过渡 */
            pointer-events: auto;
            font-size: 0.75rem;
            cursor: default;
            user-select: none;
        }
        /* 拖拽时临时禁用地图指针事件？不，但通过 js 控制地图拖动 */
        .run-panel.collapsed {
            width: auto;
            padding: 8px 12px;
            background: rgba(0,0,0,0.6);
        }
        .run-panel.collapsed .stats-row,
        .run-panel.collapsed .run-buttons,
        .run-panel.collapsed .record-status,
        .run-panel.collapsed #runStatusIcon {
            display: none;  /* 最小化时隐藏“未开始”等所有内容 */
        }
        .run-panel.collapsed .panel-header {
            margin-bottom: 0;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            cursor: grab;   /* 可拖拽把手 */
            user-select: none;
        }
        .panel-header:active {
            cursor: grabbing;
        }
        .stats-row {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
        }
        .stats-value {
            font-weight: 700;
            color: #ffb347;
        }
        .run-buttons {
            display: flex;
            gap: 8px;
            margin: 10px 0 6px;
            flex-wrap: wrap;
        }
        .run-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 30px;
            padding: 5px 10px;
            color: white;
            font-weight: 600;
            font-size: 0.7rem;
            cursor: pointer;
            flex: 1;
            text-align: center;
        }
        .run-btn.start { background: #2ecc71; color: #000; }
        .run-btn.pause { background: #f39c12; }
        .run-btn.stop { background: #e67e22; }
        .record-status {
            font-size: 0.6rem;
            text-align: center;
            margin-top: 4px;
            color: #ccc;
        }
        .collapse-icon {
            font-size: 0.9rem;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            width: 22px;
            text-align: center;
            cursor: pointer;
        }
        #runStatusIcon {
            font-size: 0.65rem;
            text-align: center;
            margin-top: 6px;
            color: #eee;
        }
        /* 分享模态框 */
        .share-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
        }
        .share-card {
            background: white;
            border-radius: 36px;
            width: 300px;
            padding: 20px;
            text-align: center;
        }
        .share-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
        }
        .share-buttons button {
            background: #1e3c72;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        @media (max-width: 550px) {
            .route-card { width: 210px; padding: 10px 12px; }
            .run-panel { width: 190px; padding: 8px 12px; }
            .run-btn { padding: 4px 8px; font-size: 0.65rem; }
            .app-header { padding: 10px 16px; }
            .logo-area h1 { font-size: 1.2rem; }
            .weather-badge { font-size: 0.7rem; padding: 4px 10px; }
        }
        .leaflet-control-attribution { font-size: 8px; }
    </style>
</head>
<body>

<div id="map"></div>

<!-- 顶部栏 ———— 完全恢复原始内容 -->
<div class="app-header">
    <div class="logo-area">
        <h1><i class="fas fa-sun" style="color:#f4a261;"></i> Moscow Run</h1>
        <p>精英晨跑 · 河畔韵律</p>
    </div>
    <div class="weather-badge">
        <i class="fas fa-cloud-sun"></i>
        <span>莫斯科 · 晨间 6°C | 晴 · 优</span>
        <i class="fas fa-wind"></i>
    </div>
</div>

<!-- 底部路线卡片 -->
<div class="routes-carousel">
    <div class="routes-container" id="routesCardsContainer"></div>
</div>

<!-- 跑步数据面板（可拖拽+折叠） -->
<div class="run-panel" id="runPanel">
    <div class="panel-header" id="dragHandle">
        <span><i class="fas fa-shoe-prints"></i> 实时晨跑</span>
        <span class="collapse-icon" id="togglePanelBtn"><i class="fas fa-angle-down" id="collapseIcon"></i></span>
    </div>
    <div class="panel-content">
        <div class="stats-row">
            <span>🏁 距离</span>
            <span class="stats-value" id="runDistance">0.00 km</span>
        </div>
        <div class="stats-row">
            <span>⏱️ 时长</span>
            <span class="stats-value" id="runTime">00:00</span>
        </div>
        <div class="stats-row">
            <span>⚡ 配速</span>
            <span class="stats-value" id="runPace">0'00"</span>
        </div>
        <div class="stats-row">
            <span>🔥 卡路里</span>
            <span class="stats-value" id="runCalories">0</span>
        </div>
        <div class="run-buttons">
            <button class="run-btn start" id="startRunBtn"><i class="fas fa-play"></i> 开跑</button>
            <button class="run-btn pause" id="pauseRunBtn"><i class="fas fa-pause"></i> 暂停</button>
            <button class="run-btn stop" id="stopRunBtn"><i class="fas fa-stop"></i> 结束</button>
        </div>
        <div class="record-status" id="recordStatusMsg">📍 点击开跑，记录你的莫斯科轨迹</div>
        <div id="runStatusIcon"></div>
    </div>
</div>

<script>
    // ======================= 1. 莫斯科市区精美路线（保持初版）=======================
    const routesData = [
        {
            id: "moscow_river",
            name: "🌊 莫斯科河畔长廊",
            color: "#2c7da0",
            highlightColor: "#1f9e7a",
            description: "沿莫斯科河精华路段，克里姆林宫至高尔基公园，朝霞映照河面。",
            distanceKm: 7.2,
            difficulty: "轻松",
            coords: [
                [55.7492,37.6150],[55.7478,37.6132],[55.7458,37.6105],[55.7430,37.6086],
                [55.7403,37.6078],[55.7380,37.6069],[55.7355,37.6058],[55.7328,37.6039],
                [55.7302,37.6016],[55.7278,37.5992],[55.7302,37.6016],[55.7328,37.6039],
                [55.7355,37.6058],[55.7380,37.6069],[55.7403,37.6078],[55.7430,37.6086],
                [55.7458,37.6105],[55.7478,37.6132],[55.7492,37.6150]
            ],
            startPoint: [55.7492,37.6150],
            endPoint: [55.7278,37.5992]
        },
        {
            id: "kremlin_ring",
            name: "🏰 克里姆林宫环线",
            color: "#bc6c25",
            highlightColor: "#e9b35f",
            description: "环绕红场与亚历山大花园，历史感十足。",
            distanceKm: 2.4,
            difficulty: "人文",
            coords: [
                [55.7543,37.6205],[55.7558,37.6180],[55.7545,37.6120],[55.7520,37.6095],
                [55.7503,37.6138],[55.7498,37.6172],[55.7509,37.6215],[55.7522,37.6230],[55.7543,37.6205]
            ],
            startPoint: [55.7543,37.6205],
            endPoint: [55.7543,37.6205]
        },
        {
            id: "sparrow_hills",
            name: "⛰️ 麻雀山观景台",
            color: "#5e8b5e",
            highlightColor: "#87b38c",
            description: "卢日尼基体育场 → 麻雀山观景台，俯瞰莫斯科河。",
            distanceKm: 4.1,
            difficulty: "起伏",
            coords: [
                [55.7154,37.5533],[55.7125,37.5496],[55.7098,37.5465],[55.7074,37.5422],
                [55.7058,37.5360],[55.7039,37.5307],[55.7068,37.5355],[55.7085,37.5433],
                [55.7109,37.5482],[55.7140,37.5520]
            ],
            startPoint: [55.7154,37.5533],
            endPoint: [55.7039,37.5307]
        }
    ];
    // 计算精确距离
    function computeRouteDistance(coords) {
        let total = 0; const R = 6371;
        for (let i=0; i<coords.length-1; i++) {
            const lat1 = coords[i][0]*Math.PI/180, lon1 = coords[i][1]*Math.PI/180;
            const lat2 = coords[i+1][0]*Math.PI/180, lon2 = coords[i+1][1]*Math.PI/180;
            const dlat = lat2-lat1, dlon = lon2-lon1;
            const a = Math.sin(dlat/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dlon/2)**2;
            total += R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
        return total;
    }
    routesData.forEach(r => {
        r.distanceKm = parseFloat(computeRouteDistance(r.coords).toFixed(1));
        r.durationMin = Math.round(r.distanceKm * 7.2);
        r.calories = Math.round(r.distanceKm * 62);
    });
    
    // 初始化地图
    const map = L.map('map').setView([55.7517, 37.6178], 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
        subdomains: 'abcd'
    }).addTo(map);
    
    // 绘制路线及标记
    const startIcon = L.divIcon({ html: '<div style="background:#2ecc71; width:22px;height:22px;border-radius:50%;border:2px solid white;text-align:center;"><i class="fas fa-play" style="color:white;font-size:9px;margin-left:1px;"></i></div>', iconSize: [22,22] });
    const endIcon = L.divIcon({ html: '<div style="background:#e67e22; width:22px;height:22px;border-radius:50%;border:2px solid white;"><i class="fas fa-flag-checkered" style="color:white;font-size:9px;"></i></div>', iconSize: [22,22] });
    let routeLayers = [];
    routesData.forEach(route => {
        const poly = L.polyline(route.coords, { color: route.color, weight: 5, opacity: 0.8 }).addTo(map);
        const startM = L.marker(route.startPoint, { icon: startIcon }).bindTooltip(`🏁 ${route.name} 起点`);
        const endM = L.marker(route.endPoint, { icon: endIcon }).bindTooltip(`🏆 终点`);
        startM.addTo(map); endM.addTo(map);
        routeLayers.push({ id: route.id, polyline: poly, bounds: L.latLngBounds(route.coords), originalColor: route.color, highlightColor: route.highlightColor });
    });
    function highlightRoute(id) {
        routeLayers.forEach(l => l.polyline.setStyle({ color: l.originalColor, weight: 5 }));
        const active = routeLayers.find(l => l.id === id);
        if(active) { active.polyline.setStyle({ color: active.highlightColor, weight: 7 }); map.fitBounds(active.bounds.pad(0.2)); }
        document.querySelectorAll('.route-card').forEach(c => c.classList.toggle('active', c.dataset.id === id));
    }
    // 生成卡片
    const cardsContainer = document.getElementById('routesCardsContainer');
    routesData.forEach(route => {
        const card = document.createElement('div');
        card.className = 'route-card';
        card.dataset.id = route.id;
        card.innerHTML = `
            <div class="route-name"><span>${route.name}</span><div class="route-badge">${route.difficulty}</div></div>
            <div class="route-stats"><span><i class="fas fa-ruler"></i> ${route.distanceKm}km</span><span><i class="far fa-clock"></i> ${route.durationMin}min</span><span><i class="fas fa-fire"></i> ${route.calories}kcal</span></div>
            <div class="route-desc"><i class="fas fa-route"></i> ${route.description.substring(0,45)}</div>
            <div class="btn-start"><i class="fas fa-chevron-right"></i> 预览</div>
        `;
        card.addEventListener('click', () => highlightRoute(route.id));
        cardsContainer.appendChild(card);
    });
    highlightRoute('moscow_river');
    // 地标点缀
    [[55.7520,37.6175,"克里姆林宫"],[55.7525,37.6231,"圣瓦西里"],[55.7356,37.6055,"高尔基公园"]].forEach(l => {
        L.marker([l[0],l[1]], { icon: L.divIcon({ html: '<i class="fas fa-map-marker-alt" style="color:#c44536;font-size:12px;"></i>', iconSize:[12,12] }) }).bindTooltip(l[2]).addTo(map);
    });
    L.control.scale({ metric:true, imperial:false, position:'bottomright' }).addTo(map);
    
    // ======================= 2. 实时轨迹记录 + 分享功能 =======================
    let watchId = null, isRunning = false, isActive = false;
    let startTimestamp = 0, pauseDuration = 0, pauseStartTime = 0;
    let positions = [];
    let runPolyline = null, currentMarker = null;
    const runDistanceSpan = document.getElementById('runDistance');
    const runTimeSpan = document.getElementById('runTime');
    const runPaceSpan = document.getElementById('runPace');
    const runCaloriesSpan = document.getElementById('runCalories');
    const recordStatusMsg = document.getElementById('recordStatusMsg');
    const runStatusIcon = document.getElementById('runStatusIcon');
    
    function distanceBetween(lat1,lng1,lat2,lng2) {
        const R = 6371e3;
        const φ1=lat1*Math.PI/180, φ2=lat2*Math.PI/180;
        const Δφ=(lat2-lat1)*Math.PI/180, Δλ=(lng2-lng1)*Math.PI/180;
        const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
    function totalDistance(points) {
        if(points.length<2) return 0;
        let d=0;
        for(let i=0;i<points.length-1;i++) d+=distanceBetween(points[i].lat,points[i].lng, points[i+1].lat,points[i+1].lng);
        return d;
    }
    function updateStats() {
        if(!isActive) return;
        const elapsedSec = (Date.now() - startTimestamp - pauseDuration)/1000;
        const mins = Math.floor(elapsedSec/60), secs = Math.floor(elapsedSec%60);
        runTimeSpan.innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        const distKm = totalDistance(positions)/1000;
        runDistanceSpan.innerText = distKm.toFixed(2)+' km';
        let paceText = "0'00\"";
        if(distKm>0 && elapsedSec>0) {
            let paceSec = elapsedSec/distKm;
            let pm = Math.floor(paceSec/60), ps = Math.floor(paceSec%60);
            paceText = `${pm}'${ps.toString().padStart(2,'0')}"`;
        }
        runPaceSpan.innerText = paceText;
        runCaloriesSpan.innerText = Math.floor(distKm*65);
    }
    function updateMapTrace() {
        if(runPolyline) map.removeLayer(runPolyline);
        if(positions.length>=2) {
            const latlngs = positions.map(p=>[p.lat,p.lng]);
            runPolyline = L.polyline(latlngs, { color:'#ff5733', weight:5 }).addTo(map);
        }
        if(currentMarker) map.removeLayer(currentMarker);
        if(positions.length>0) {
            const last = positions[positions.length-1];
            currentMarker = L.marker([last.lat, last.lng], { icon: L.divIcon({ html:'<div style="background:#ff3b3b;width:18px;height:18px;border-radius:50%;border:2px solid white;"></div>', iconSize:[18,18] }) }).addTo(map).bindTooltip("当前位置");
            map.setView([last.lat, last.lng], 15);
        }
    }
    function onLocationSuccess(pos) {
        if(!isRunning) return;
        const {latitude, longitude} = pos.coords;
        if(positions.length>0) {
            const last = positions[positions.length-1];
            if(distanceBetween(last.lat,last.lng, latitude,longitude)<3) return;
        }
        positions.push({lat:latitude, lng:longitude});
        updateStats();
        updateMapTrace();
        recordStatusMsg.innerText = `🏃 已跑 ${(totalDistance(positions)/1000).toFixed(2)} km`;
    }
    function startRunning() {
        if(isActive && isRunning) return;
        if(!isActive) {
            positions = [];
            if(runPolyline) map.removeLayer(runPolyline);
            if(currentMarker) map.removeLayer(currentMarker);
            startTimestamp = Date.now();
            pauseDuration = 0;
            isActive = true;
            isRunning = true;
            updateStats();
            runStatusIcon.innerHTML = '🟢 奔跑中';
        } else if(isActive && !isRunning) {
            if(pauseStartTime>0) pauseDuration += (Date.now()-pauseStartTime);
            pauseStartTime=0;
            isRunning=true;
            runStatusIcon.innerHTML = '🟢 奔跑中';
        }
        if(watchId) navigator.geolocation.clearWatch(watchId);
        watchId = navigator.geolocation.watchPosition(onLocationSuccess, (e)=>{recordStatusMsg.innerText=`定位错误`;}, {enableHighAccuracy:true, maximumAge:1000});
        recordStatusMsg.innerText = '📍 记录中，沿莫斯科河奔跑';
    }
    function pauseRunning() {
        if(!isActive || !isRunning) return;
        isRunning = false;
        pauseStartTime = Date.now();
        if(watchId) { navigator.geolocation.clearWatch(watchId); watchId=null; }
        recordStatusMsg.innerText = '⏸️ 暂停，点击开跑继续';
        runStatusIcon.innerHTML = '⏸️ 已暂停';
    }
    function stopRunning() {
        if(!isActive) return;
        if(watchId) navigator.geolocation.clearWatch(watchId);
        isRunning=false; isActive=false;
        const dist = (totalDistance(positions)/1000).toFixed(2);
        const elapsed = (Date.now()-startTimestamp-pauseDuration)/1000;
        const mins = Math.floor(elapsed/60), secs = Math.floor(elapsed%60);
        const pace = dist>0 ? (elapsed/60/dist).toFixed(1) : '0';
        const cal = Math.floor(parseFloat(dist)*65);
        showShareDialog(dist, `${mins}分${secs}秒`, pace, cal);
        // 重置显示
        runDistanceSpan.innerText='0.00 km'; runTimeSpan.innerText='00:00'; runPaceSpan.innerText="0'00\""; runCaloriesSpan.innerText='0';
        recordStatusMsg.innerText = '✅ 已结束，可重新开跑';
        runStatusIcon.innerHTML = '';
        if(runPolyline) map.removeLayer(runPolyline);
        if(currentMarker) map.removeLayer(currentMarker);
        positions = [];
    }
    function showShareDialog(dist, timeStr, pace, cal) {
        const modal = document.createElement('div');
        modal.className = 'share-modal';
        modal.innerHTML = `
            <div class="share-card">
                <i class="fas fa-running" style="font-size:32px; color:#ff7a3c;"></i>
                <h3>🏅 莫斯科晨跑完成</h3>
                <p>📏 ${dist} km &nbsp; ⏱️ ${timeStr}</p>
                <p>⚡ 配速 ${pace} min/km &nbsp; 🔥 ${cal} kcal</p>
                <p style="font-size:12px; color:gray;">#莫斯科河畔 #自由轨迹</p>
                <div class="share-buttons">
                    <button id="shareTextBtn">📝 分享文本</button>
                    <button id="shareImgBtn">📸 截图分享</button>
                    <button id="closeShareBtn">关闭</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        const shareText = `🏃‍♂️ 我在【莫斯科晨跑】完成了 ${dist}km！⏱️ ${timeStr} | 配速 ${pace}/km | 🔥 ${cal} kcal 🌅 莫斯科河畔晨光。 #莫斯科晨跑`;
        document.getElementById('shareTextBtn').onclick = async () => {
            if(navigator.share) try{ await navigator.share({title:'晨跑战绩', text:shareText}); } catch(e){}
            else { await navigator.clipboard.writeText(shareText); alert('文本已复制'); }
            modal.remove();
        };
        document.getElementById('shareImgBtn').onclick = async () => {
            try {
                const canvas = await html2canvas(document.getElementById('map'), { scale:1.5, backgroundColor:'#f0f2f5' });
                const imgData = canvas.toDataURL('image/png');
                if(navigator.share && navigator.canShare) {
                    const blob = await (await fetch(imgData)).blob();
                    const file = new File([blob], 'moscow_run.png', {type:'image/png'});
                    if(navigator.canShare({files:[file]})) await navigator.share({title:'轨迹截图', files:[file]});
                    else downloadImg(imgData);
                } else { downloadImg(imgData); }
            } catch(e) { alert('截图失败'); }
            modal.remove();
        };
        document.getElementById('closeShareBtn').onclick = () => modal.remove();
        function downloadImg(data) { const a=document.createElement('a'); a.href=data; a.download='moscow_run.png'; a.click(); alert('截图已保存'); }
    }
    document.getElementById('startRunBtn').addEventListener('click', startRunning);
    document.getElementById('pauseRunBtn').addEventListener('click', pauseRunning);
    document.getElementById('stopRunBtn').addEventListener('click', stopRunning);
    
    // ======================= 面板折叠 + 可拖拽移动 =======================
    const panelEl = document.getElementById('runPanel');
    const dragHandle = document.getElementById('dragHandle');
    const collapseBtn = document.getElementById('togglePanelBtn');
    const collapseIconSpan = document.getElementById('collapseIcon');
    let isCollapsed = false;
    // 折叠逻辑
    collapseBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        isCollapsed = !isCollapsed;
        if(isCollapsed) {
            panelEl.classList.add('collapsed');
            collapseIconSpan.className = 'fas fa-angle-up';
        } else {
            panelEl.classList.remove('collapsed');
            collapseIconSpan.className = 'fas fa-angle-down';
        }
    });
    
    // 拖拽移动 (基于鼠标/触摸)
    let dragging = false;
    let startX, startY, startLeft, startTop;
    // 获取当前 left/top 值 (如果之前没有设置 left/top，就用 getComputedStyle 或初始值)
    function getPanelPosition() {
        const style = window.getComputedStyle(panelEl);
        let left = style.left;
        let top = style.top;
        if (left === 'auto' || left === '') left = '12px';
        if (top === 'auto' || top === '') top = 'auto';
        return { left: parseFloat(left), top: parseFloat(top), isBottom: style.bottom !== 'auto' };
    }
    function setPanelPosition(leftPx, topPx) {
        panelEl.style.left = leftPx + 'px';
        panelEl.style.top = topPx + 'px';
        panelEl.style.bottom = 'auto';
        panelEl.style.right = 'auto';
    }
    function onMouseMove(e) {
        if (!dragging) return;
        e.preventDefault();
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        let dx = clientX - startX;
        let dy = clientY - startY;
        let newLeft = startLeft + dx;
        let newTop = startTop + dy;
        // 边界限制（可选）
        const maxX = window.innerWidth - panelEl.offsetWidth - 10;
        const maxY = window.innerHeight - panelEl.offsetHeight - 10;
        newLeft = Math.min(Math.max(5, newLeft), maxX);
        newTop = Math.min(Math.max(5, newTop), maxY);
        setPanelPosition(newLeft, newTop);
    }
    function onMouseUp() {
        if (!dragging) return;
        dragging = false;
        document.removeEventListener('mousemove', onMouseMove);
        document.removeEventListener('mouseup', onMouseUp);
        document.removeEventListener('touchmove', onMouseMove);
        document.removeEventListener('touchend', onMouseUp);
        // 恢复地图拖动
        map.dragging.enable();
        if (map.tap) map.tap.enable();
    }
    function startDrag(e) {
        if (e.target === collapseBtn || collapseBtn.contains(e.target)) return; // 点击折叠按钮不拖拽
        e.preventDefault();
        dragging = true;
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        startX = clientX;
        startY = clientY;
        const rect = panelEl.getBoundingClientRect();
        startLeft = rect.left;
        startTop = rect.top;
        // 临时禁用地图拖拽，防止冲突
        map.dragging.disable();
        if (map.tap) map.tap.disable();
        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
        document.addEventListener('touchmove', onMouseMove);
        document.addEventListener('touchend', onMouseUp);
    }
    dragHandle.addEventListener('mousedown', startDrag);
    dragHandle.addEventListener('touchstart', startDrag, { passive: false });
    // 确保折叠按钮不触发拖拽
    collapseBtn.addEventListener('mousedown', (e) => e.stopPropagation());
    collapseBtn.addEventListener('touchstart', (e) => e.stopPropagation());
    
    window.addEventListener('resize', () => map.invalidateSize());
    if(!navigator.geolocation) recordStatusMsg.innerText = '❌ 无定位支持';
</script>
</body>
</html>
